<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&display=swap" rel="stylesheet">

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #fffaf5, #fdf6ee);
  color: #333;
}

nav {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 18px;
  background: rgba(255,255,255,0.8);
  position: sticky;
  top: 0;
}

nav button {
  background: none;
  border: none;
  font-size: 15px;
  cursor: pointer;
  color: #b48a5a;
  font-weight: 600;
}

section {
  display: none;
  padding: 80px 20px;
  text-align: center;
}

.active {
  display: block;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
  color: #b48a5a;
}

.card {
  background: white;
  margin: 12px auto;
  padding: 25px;
  border-radius: 14px;
  max-width: 400px;
}

#successMsg {
  display: none;
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: #b48a5a;
  color: white;
  padding: 12px 25px;
  border-radius: 8px;
}
</style>

</head>

<body>

<nav>
  <button onclick="showTab('welcome')">Welcome</button>
  <button onclick="showTab('events')">Events</button>
  <button onclick="showTab('location')">Location</button>
  <button onclick="showTab('gallery')">Gallery</button>
  <button onclick="showTab('guestbook')">Guestbook</button>
  <button onclick="showTab('upload')">Upload</button>
</nav>

<section id="welcome" class="active">
  <h1>Brother Name & Partner Name</h1>
  <h2>25 - 26 April 2026</h2>
  <div id="countdown"></div>
</section>

<section id="events">
  <h2>Events</h2>
  <div class="card">Mehendi - 25 April</div>
  <div class="card">Sangeet - 25 April</div>
  <div class="card">Wedding - 26 April</div>
  <div class="card">Reception - 26 April</div>
</section>

<section id="location">
  <h2>Location</h2>
  <p>Venue details here</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <div id="galleryImages"></div>
</section>

<section id="guestbook">
  <h2>Guestbook</h2>

<input id="name" placeholder="Your name"><br><br>

  <textarea id="message" placeholder="Your message"></textarea><br><br>

<button onclick="addMessage()">Send Wishes</button>

  <div id="successMsg"></div>
</section>

<section id="upload">
  <h2>Upload Photos</h2>
  <input type="file" id="photoInput"><br><br>
  <button onclick="uploadPhoto()">Upload Photo</button>
</section>

<script>
function showTab(tabId) {
  document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
}

const countdown = document.getElementById("countdown");
const weddingDate = new Date("April 25, 2026").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const gap = weddingDate - now;

  const d = Math.floor(gap / (1000*60*60*24));
  const h = Math.floor((gap / (1000*60*60)) % 24);
  const m = Math.floor((gap / (1000*60)) % 60);
  const s = Math.floor((gap / 1000) % 60);

  countdown.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}, 1000);
</script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDGNec9HVG0vzcR1mYX6vGIj6pA5_gp-vY",
  authDomain: "wedding-site-c711f.firebaseapp.com",
  projectId: "wedding-site-c711f",
  storageBucket: "wedding-site-c711f.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ===== MESSAGE =====
function addMessage() {
  const name = document.getElementById("name").value;
  const message = document.getElementById("message").value;

  if (!name || !message) {
    alert("Fill all fields");
    return;
  }

  db.collection("messages").add({
    name,
    message,
    timestamp: new Date()
  });

  document.getElementById("name").value = "";
  document.getElementById("message").value = "";

  showPopup("Message delivered ❤️ Thank you!");
}

// ===== UPLOAD =====
function uploadPhoto() {
  const file = document.getElementById("photoInput").files[0];

  if (!file) {
    alert("Select a photo");
    return;
  }

  const ref = storage.ref("photos/" + Date.now());

  ref.put(file).then(snapshot => {
    snapshot.ref.getDownloadURL().then(url => {

      db.collection("photos").add({
        imageUrl: url,
        status: "pending",
        timestamp: new Date()
      });

      showPopup("Photo uploaded 📸");

      document.getElementById("photoInput").value = "";
    });
  });
}

// ===== LOAD GALLERY =====
function loadGallery() {
  db.collection("photos")
    .where("status", "==", "approved")
    .onSnapshot(snapshot => {
      const gallery = document.getElementById("galleryImages");
      gallery.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();
        gallery.innerHTML += `
          <img src="${data.imageUrl}" style="width:200px; margin:10px; border-radius:10px;">
        `;
      });
    });
}

loadGallery();

// ===== POPUP =====
function showPopup(text) {
  const popup = document.getElementById("successMsg");
  popup.innerText = text;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 5000);
}
</script>

</body>
</html>
