<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(to bottom, #fffaf5, #fdf6ee);
  color: #333;
}

/* NAV */
nav {
  display: flex;
  justify-content: center;
  gap: 25px;
  padding: 18px;
  background: rgba(255,255,255,0.8);
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
}

nav button {
  background: none;
  border: none;
  font-size: 15px;
  cursor: pointer;
  color: #b48a5a;
  font-weight: 600;
}

/* SECTIONS */
section {
  display: none;
  padding: 80px 20px;
  text-align: center;
}

.active {
  display: block;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
  color: #b48a5a;
}

.card {
  background: white;
  margin: 12px auto;
  padding: 25px;
  border-radius: 14px;
  max-width: 400px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.06);
}
</style>

</head>

<body>

<nav>
  <button onclick="showTab('welcome')">Welcome</button>
  <button onclick="showTab('events')">Events</button>
  <button onclick="showTab('location')">Location</button>
  <button onclick="showTab('gallery')">Gallery</button>
  <button onclick="showTab('guestbook')">Guestbook</button>
  <button onclick="showTab('upload')">Upload</button>
</nav>

<section id="welcome" class="active">
  <h1>Brother Name & Partner Name</h1>
  <h2>25 - 26 April 2026</h2>
  <div id="countdown"></div>
</section>

<section id="events">
  <h2>Events</h2>
  <div class="card">Mehendi - 25 April</div>
  <div class="card">Sangeet - 25 April</div>
  <div class="card">Wedding - 26 April</div>
  <div class="card">Reception - 26 April</div>
</section>

<section id="location">
  <h2>Location</h2>
  <p>Venue details here</p>
</section>

<section id="gallery">
  <h2>Gallery</h2>
  <p>Coming soon...</p>
</section>

<section id="guestbook">
  <h2>Guestbook</h2>
  <input placeholder="Your name"><br><br>
  <textarea placeholder="Your message"></textarea>
</section>

<section id="upload">
  <h2>Upload Photos</h2>
  <input type="file">
</section>

<script>
function showTab(tabId) {
  document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
  document.getElementById(tabId).classList.add("active");
}

const countdown = document.getElementById("countdown");
const weddingDate = new Date("April 25, 2026").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const gap = weddingDate - now;

  const d = Math.floor(gap / (1000*60*60*24));
  const h = Math.floor((gap / (1000*60*60)) % 24);
  const m = Math.floor((gap / (1000*60)) % 60);
  const s = Math.floor((gap / 1000) % 60);

  countdown.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}, 1000);
</script>

</body>
</html>
